    <script>
        function playSynthSound(type) {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                if (!ctx) return;
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain);
                gain.connect(ctx.destination);
                
                if (type === 'hit') {
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(160, ctx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(10, ctx.currentTime + 0.12);
                    gain.gain.setValueAtTime(0.2, ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.12);
                    osc.start();
                    osc.stop(ctx.currentTime + 0.12);
                } else if (type === 'heal') {
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(280, ctx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(650, ctx.currentTime + 0.25);
                    gain.gain.setValueAtTime(0.15, ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.25);
                    osc.start();
                    osc.stop(ctx.currentTime + 0.25);
                } else if (type === 'spell') {
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(380, ctx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(90, ctx.currentTime + 0.35);
                    gain.gain.setValueAtTime(0.18, ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.35);
                    osc.start();
                    osc.stop(ctx.currentTime + 0.35);
                } else if (type === 'loot') {
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(440, ctx.currentTime);
                    osc.frequency.setValueAtTime(554.37, ctx.currentTime + 0.08);
                    osc.frequency.setValueAtTime(659.25, ctx.currentTime + 0.16);
                    gain.gain.setValueAtTime(0.12, ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.35);
                    osc.start();
                    osc.stop(ctx.currentTime + 0.35);
                } else if (type === 'gameover') {
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(180, ctx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(60, ctx.currentTime + 0.6);
                    gain.gain.setValueAtTime(0.25, ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.6);
                    osc.start();
                    osc.stop(ctx.currentTime + 0.6);
                }
            } catch (e) {
                // 忽略未與網頁互動時的音效播放錯誤
            }
        }

        function roll(d) { return Math.floor(Math.random() * d) + 1; }

        function getCritThreshold() {
            if (!gameState.player) return 20;
            const pName = gameState.player.name;
            const wId = gameState.gear.weapon ? gameState.gear.weapon.id : '';
            
            if (wId === 'falchion_p1') {
                return 19;
            }
            if (pName === '武僧' && (wId === 'staff_p1' || wId === 'jutte_p1')) {
                return 19;
            }
            if (pName === '盜賊') {
                if (wId === 'scimitar_p1') return 18;
                return 19;
            } else {
                if (wId === 'scimitar_p1') return 19;
                return 20;
            }
        }

        function log(msg, colorClass = 'text-gray-300') {
            const logWindow = document.getElementById('log-window');
            if (!logWindow) return;
            const entry = document.createElement('div');
            entry.className = `${colorClass} mb-2 border-b border-gray-800/50 pb-1 leading-relaxed animate-fade-in`;
            entry.innerHTML = `> ${msg}`;
            logWindow.appendChild(entry);
            logWindow.scrollTop = logWindow.scrollHeight;
        }

        function usePotionOutsideCombat() {
            if (!gameState.player) return;
            if (gameState.potions <= 0) {
                log(`你身上已經沒有治療藥水了！`, 'text-rose-400');
                return;
            }
            if (gameState.player.hp >= gameState.player.maxHp) {
                log(`你的生命值已是全滿，不需要使用藥水！`, 'text-gray-400');
                return;
            }
            gameState.potions--;
            gameState.player.hp = Math.min(gameState.player.maxHp, gameState.player.hp + 20);
            playSynthSound('heal');
            log(`🧪 你飲用了一瓶治療藥水，恢復了 20 點生命值！`, 'text-emerald-400 font-bold');
            updateStats();
        }

        function updateStats() {
            if (!gameState.player) return;
            
            let baseAc = gameState.player.ac;
            let finalAtkBonus = gameState.player.atkBonus;
            let finalDmgBonus = 0;
            let spellBonus = 0;
            let gearNames = [];

            const hasShield = !!gameState.gear.shield;

            if (gameState.gear.armor) {
                if (gameState.gear.armor.id === 'heavy_armor') {
                    baseAc = hasShield ? 24 : 20;
                } else if (gameState.gear.armor.id === 'studded_leather') {
                    baseAc = hasShield ? 20 : 16;
                } else if (gameState.gear.armor.id === 'robe') {
                    baseAc += 3;
                    if (hasShield) baseAc += 4;
                }
                gearNames.push(gameState.gear.armor.name);
            } else {
                if (hasShield) baseAc += 4;
            }

            if (hasShield) {
                gearNames.push(gameState.gear.shield.name);
            }

            let monkKungFuActive = false;

            if (gameState.gear.weapon) {
                const w = gameState.gear.weapon;
                gearNames.push(w.name);
                if (w.id === 'longsword_p1') { finalAtkBonus += 1; finalDmgBonus += 1; }
                else if (w.id === 'greatsword_p1') { finalAtkBonus += 2; finalDmgBonus += 2; }
                else if (w.id === 'falchion_p1') { finalAtkBonus += 2; } 
                else if (w.id === 'spear_p1') { finalAtkBonus += 3; finalDmgBonus += 1; }
                else if (w.id === 'staff_p1') { finalAtkBonus += 1; finalDmgBonus += 1; spellBonus += 2; }
                else if (w.id === 'shortsword_p1') { finalAtkBonus += 1; }
                else if (w.id === 'scimitar_p1') { finalAtkBonus += 1; } 
                else if (w.id === 'sling_p1') { finalAtkBonus -= 1; finalDmgBonus += 2; } 
                else if (w.id === 'jutte_p1') { finalAtkBonus += 1; baseAc += 1; } 

                if (gameState.player.name === '戰士') {
                    finalAtkBonus += 2;
                    finalDmgBonus += 2;
                }

                if (gameState.player.name === '野蠻人' && w.no_shield) {
                    finalAtkBonus += 3;
                    finalDmgBonus += 3;
                }

                if (gameState.player.name === '武僧' && (w.id === 'staff_p1' || w.id === 'jutte_p1')) {
                    finalAtkBonus += 1;
                    monkKungFuActive = true;
                }
            }

            if (gameState.gear.amulet) {
                gearNames.push(gameState.gear.amulet.name);
                if (gameState.gear.amulet.id === 'caster_amulet') {
                    spellBonus += 2;
                } else if (gameState.gear.amulet.id === 'skin_amulet') {
                    baseAc += 2;
                }
            }

            if (gameState.combatState && gameState.combatState.rageTurns > 0) {
                finalAtkBonus += 2;
                finalDmgBonus += 2;
                baseAc -= 2;
            }

            if (gameState.combatState && gameState.combatState.barkskinTurns > 0) {
                baseAc += 4;
            }

            if (gameState.combatState && gameState.combatState.playerFrozenTurns > 0) {
                baseAc -= 2;
                finalAtkBonus -= 2;
            }

            if (gameState.combatState && gameState.combatState.playerProneTurns > 0) {
                baseAc -= 4;
            }

            gameState.player.currentAC = baseAc;
            gameState.player.currentAtkBonus = finalAtkBonus;
            gameState.player.currentDmgBonus = finalDmgBonus;
            gameState.player.spellBonus = spellBonus;

            const playerHp = Math.max(0, gameState.player.hp);
            const playerMaxHp = gameState.player.maxHp;

            document.getElementById('stats-panel').classList.remove('hidden');
            document.getElementById('hp-val').textContent = playerHp;
            document.getElementById('max-hp-val').textContent = playerMaxHp;
            document.getElementById('ac-val').textContent = baseAc;
            document.getElementById('class-val').textContent = gameState.player.name;
            document.getElementById('potion-val').textContent = gameState.potions;

            let gearText = gearNames.length > 0 ? `裝備: ${gearNames.join(' | ')}` : "裝備: 破舊衣物";
            if (gameState.player.name === '戰士' && gameState.gear.weapon) {
                gearText += " | ⚔️ 武器訓練：命中與傷害 +2！";
            }
            if (gameState.player.name === '野蠻人' && gameState.gear.weapon && gameState.gear.weapon.no_shield) {
                gearText += " | 🪓 兇蠻武器：命中與傷害 +3！";
            }
            if (monkKungFuActive) {
                gearText += " | 🥋 功夫大師：命中+1、19-20重擊！";
            }
            document.getElementById('equipped-gear-display').textContent = gearText;

            if (gameState.scene.startsWith('combat') && gameState.currentEnemy) {
                const enemy = gameState.currentEnemy;
                const enemyHp = Math.max(0, enemy.hp);
                const enemyMaxHp = enemy.maxHp;

                const pPct = Math.max(0, Math.floor((playerHp / playerMaxHp) * 100));
                const cardPlayerHp = document.getElementById('card-player-hp');
                const cardPlayerMaxHp = document.getElementById('card-player-max-hp');
                const cardPlayerHpPct = document.getElementById('card-player-hp-pct');
                const cardPlayerHpBar = document.getElementById('card-player-hp-bar');
                const cardPlayerAc = document.getElementById('card-player-ac');
                const cardPlayerHit = document.getElementById('card-player-hit-val');
                const cardPlayerDmg = document.getElementById('card-player-dmg-val');

                if (cardPlayerHp) cardPlayerHp.textContent = playerHp;
                if (cardPlayerMaxHp) cardPlayerMaxHp.textContent = playerMaxHp;
                if (cardPlayerHpPct) cardPlayerHpPct.textContent = `${pPct}%`;
                if (cardPlayerHpBar) cardPlayerHpBar.style.width = `${pPct}%`;
                if (cardPlayerAc) cardPlayerAc.textContent = baseAc;
                if (cardPlayerHit) cardPlayerHit.textContent = `+${finalAtkBonus}`;
                if (cardPlayerDmg) {
                    const wId = gameState.gear.weapon ? gameState.gear.weapon.id : '';
                    const critLimit = getCritThreshold();
                    const bStr = `1D${gameState.player.baseDmgDie}+${gameState.player.baseDmgBonus + finalDmgBonus}`;
                    let suffix = ` (重擊門檻: ${critLimit}+)`;
                    if (gameState.player.name === '盜賊') {
                        if (wId === 'shortsword_p1') suffix += " (背刺 x6)";
                        else if (wId === 'jutte_p1') suffix += " (背刺 x5)";
                        else if (wId === 'longsword_p1' || wId === 'scimitar_p1') suffix += " (背刺 x4)";
                        else suffix += " (背刺 x3)";
                    }
                    cardPlayerDmg.textContent = bStr + suffix;
                }

                const cardPotionBtnCount = document.getElementById('combat-potion-count');
                if (cardPotionBtnCount) {
                    cardPotionBtnCount.textContent = `剩餘數量: ${gameState.potions} 瓶 (消耗1回合行動)`;
                    if (gameState.potions <= 0) {
                        const btn = cardPotionBtnCount.closest('button');
                        if (btn) {
                            btn.disabled = true;
                            btn.className = 'bg-gray-800/80 p-3 sm:p-4 rounded-xl font-bold text-gray-500 cursor-not-allowed border border-gray-700 flex flex-col justify-center items-center col-span-1 sm:col-span-2';
                        }
                    }
                }

                const cardPlayerBuffs = document.getElementById('card-player-buffs');
                if (cardPlayerBuffs) {
                    let playerBuffsHtml = '';
                    if (gameState.combatState.rageTurns > 0) {
                        playerBuffsHtml += `<span class="bg-rose-600 text-white text-[10px] px-1.5 py-0.5 rounded-full font-bold animate-pulse">🔥 狂暴 (${gameState.combatState.rageTurns})</span>`;
                    }
                    if (gameState.combatState.stoneskinTurns > 0) {
                        playerBuffsHtml += `<span class="bg-sky-600 text-white text-[10px] px-1.5 py-0.5 rounded-full font-bold">🧱 石膚 (${gameState.combatState.stoneskinTurns})</span>`;
                    }
                    if (gameState.combatState.barkskinTurns > 0) {
                        playerBuffsHtml += `<span class="bg-emerald-600 text-white text-[10px] px-1.5 py-0.5 rounded-full font-bold animate-pulse">🌿 樹膚 (${gameState.combatState.barkskinTurns})</span>`;
                    }
                    if (gameState.combatState.backstabCooldown > 0) {
                        playerBuffsHtml += `<span class="bg-fuchsia-600 text-white text-[10px] px-1.5 py-0.5 rounded-full font-bold">🔪 背刺 CD (${gameState.combatState.backstabCooldown})</span>`;
                    }
                    if (gameState.combatState.playerFrozenTurns > 0) {
                        playerBuffsHtml += `<span class="bg-cyan-500 text-black text-[10px] px-1.5 py-0.5 rounded-full font-bold animate-pulse">❄️ 凍結 (${gameState.combatState.playerFrozenTurns})</span>`;
                    }
                    if (gameState.combatState.playerProneTurns > 0) {
                        playerBuffsHtml += `<span class="bg-amber-600 text-white text-[10px] px-1.5 py-0.5 rounded-full font-bold animate-bounce">🧼 跌倒 (${gameState.combatState.playerProneTurns})</span>`;
                    }
                    if (gameState.player.name === '戰士' && gameState.gear.weapon) {
                        playerBuffsHtml += `<span class="bg-indigo-600 text-white text-[10px] px-1.5 py-0.5 rounded-full font-bold">⚔️ 武器訓練</span>`;
                    }
                    if (gameState.player.name === '野蠻人' && gameState.gear.weapon && gameState.gear.weapon.no_shield) {
                        playerBuffsHtml += `<span class="bg-amber-700 text-white text-[10px] px-1.5 py-0.5 rounded-full font-bold">🪓 兇蠻武器</span>`;
                    }
                    if (monkKungFuActive) {
                        playerBuffsHtml += `<span class="bg-amber-600 text-black text-[10px] px-1.5 py-0.5 rounded-full font-bold">🥋 功夫大師</span>`;
                    }
                    cardPlayerBuffs.innerHTML = playerBuffsHtml || '<span class="text-[10px] text-gray-500">無狀態效果</span>';
                }

                const ePct = Math.max(0, Math.floor((enemyHp / enemyMaxHp) * 100));
                const cardEnemyHp = document.getElementById('card-enemy-hp');
                const cardEnemyMaxHp = document.getElementById('card-enemy-max-hp');
                const cardEnemyHpPct = document.getElementById('card-enemy-hp-pct');
                const cardEnemyHpBar = document.getElementById('card-enemy-hp-bar');
                const cardEnemyAc = document.getElementById('card-enemy-ac');

                if (cardEnemyHp) cardEnemyHp.textContent = enemyHp;
                if (cardEnemyMaxHp) cardEnemyMaxHp.textContent = enemyMaxHp;
                if (cardEnemyHpPct) cardEnemyHpPct.textContent = `${ePct}%`;
                if (cardEnemyHpBar) cardEnemyHpBar.style.width = `${ePct}%`;
                
                if (cardEnemyAc) {
                    let enemyAcDisplay = enemy.ac;
                    if (gameState.combatState.enemyProneTurns > 0) enemyAcDisplay -= 4;
                    cardEnemyAc.textContent = enemyAcDisplay;
                }

                const cardEnemyDebuffs = document.getElementById('card-enemy-debuffs');
                if (cardEnemyDebuffs) {
                    let enemyDebuffsHtml = '';
                    if (gameState.combatState.enemyProneTurns > 0) {
                        enemyDebuffsHtml += `<span class="bg-amber-600 text-white text-[10px] px-1.5 py-0.5 rounded-full font-bold animate-bounce">🧼 跌倒 (${gameState.combatState.enemyProneTurns})</span>`;
                    }
                    if (gameState.combatState.enemyBlindTurns > 0) {
                        enemyDebuffsHtml += `<span class="bg-yellow-600 text-black text-[10px] px-1.5 py-0.5 rounded-full font-bold">👁️ 目盲 (${gameState.combatState.enemyBlindTurns})</span>`;
                    }
                    if (gameState.combatState.enemyStunnedTurns > 0) {
                        enemyDebuffsHtml += `<span class="bg-purple-600 text-white text-[10px] px-1.5 py-0.5 rounded-full font-bold animate-pulse">⚡ 震懾 (${gameState.combatState.enemyStunnedTurns})</span>`;
                    }
                    if (gameState.combatState.enemyIntimidatedTurns > 0) {
                        enemyDebuffsHtml += `<span class="bg-orange-600 text-white text-[10px] px-1.5 py-0.5 rounded-full font-bold">💢 威壓 (${gameState.combatState.enemyIntimidatedTurns})</span>`;
                    }
                    if (gameState.combatState.enemyPoisonedTurns > 0) {
                        enemyDebuffsHtml += `<span class="bg-emerald-600 text-white text-[10px] px-1.5 py-0.5 rounded-full font-bold animate-pulse">🤢 中毒 (${gameState.combatState.enemyPoisonedTurns})</span>`;
                    }
                    if (gameState.combatState.enemyStoneskinTurns > 0) {
                        enemyDebuffsHtml += `<span class="bg-sky-600 text-white text-[10px] px-1.5 py-0.5 rounded-full font-bold">🧱 石膚 (${gameState.combatState.enemyStoneskinTurns})</span>`;
                    }
                    if (gameState.combatState.fatigueTurns > 0) {
                        enemyDebuffsHtml += `<span class="bg-sky-500 text-white text-[10px] px-1.5 py-0.5 rounded-full font-bold animate-pulse">🌀 力竭 (${gameState.combatState.fatigueTurns})</span>`;
                        if (enemy.isFlying) {
                            enemyDebuffsHtml += `<span class="bg-stone-600 text-stone-200 text-[10px] px-1.5 py-0.5 rounded-full font-bold">🚫 擊墜 (地)</span>`;
                        }
                    }
                    cardEnemyDebuffs.innerHTML = enemyDebuffsHtml || '<span class="text-[10px] text-gray-500">無狀態效果</span>';
                }

                const enemyPanel = document.getElementById('enemy-stats-panel');
                if (enemyPanel) {

                    let enemyAcDisplay = enemy.ac;
                    if (gameState.combatState.enemyProneTurns > 0) enemyAcDisplay -= 4;
                    document.getElementById('enemy-ac-val').textContent = enemyAcDisplay;
                }
            } else {
                const enemyPanel = document.getElementById('enemy-stats-panel');
                if (enemyPanel) enemyPanel.classList.add('hidden');
            }

        function usePotionInCombat(nextScene) {
            if (gameState.potions <= 0) {
                log(`你身上已經沒有治療藥水了！`, 'text-rose-400');
                return;
            }
            gameState.potions--;
            gameState.player.hp = Math.min(gameState.player.maxHp, gameState.player.hp + 20);
            playSynthSound('heal');
            log(`🧪 戰況危急！你飲用了一瓶治療藥水，HP 恢復了 20 點！`, 'text-emerald-400 font-bold');
            
            updateStats();
            
            const actions = document.getElementById('action-panel');
            actions.innerHTML = '<div class="col-span-1 sm:col-span-2 text-center text-rose-300 py-4 font-bold animate-pulse flex justify-center items-center h-full">⚔️ 雙方交鋒中...</div>';
            setTimeout(() => {
                enemyTurn(nextScene);
            }, 1000);
        }

        window.skipLootBlessing = () => {
            playSynthSound('heal');
            gameState.player.ac += 2;
            gameState.player.maxHp += 2;
            gameState.player.hp = Math.min(gameState.player.maxHp, gameState.player.hp + 2);
            log(`🎁 [深淵賜福] 深淵感受到你戰勝了貪婪，賜福給與勇氣之人！`, 'text-emerald-400 font-bold text-lg animate-pulse');
            log(`⚡ 你的防禦值 (AC) 永久提升 2 點！最大生命值 (Max HP) 永久提升 2 點！`, 'text-sky-300 font-bold');
            updateStats();
            renderScene('pre_rest_combat');
        };

        function renderScene(sceneName) {
            gameState.scene = sceneName;
            const display = document.getElementById('story-display');
            const actions = document.getElementById('action-panel');
            
            actions.className = 'flex flex-col gap-3 justify-center items-center w-full max-w-md mx-auto shrink-0';
            actions.innerHTML = '';
            
            if (sceneName === 'node_loot_phase') {
                actions.className = 'grid grid-cols-1 sm:grid-cols-2 gap-3 sm:gap-4 shrink-0 min-h-[60px]';
                if (!gameState.currentLootItem) {
                    const keys = Object.keys(gearDB);
                    const lootCount = gameState.trapSuccessFourLoot ? 4 : 2;
                    let selectedKeys = [];
                    while (selectedKeys.length < lootCount) {
                        const randomKey = keys[Math.floor(Math.random() * keys.length)];
                        if (!selectedKeys.includes(randomKey)) {
                            selectedKeys.push(randomKey);
                        }
                    }
                    gameState.currentLootItem = selectedKeys.map(k => ({ ...gearDB[k] }));
                    gameState.trapSuccessFourLoot = false;
                }

                display.innerHTML = `
                    <div class="bg-amber-900/40 border border-amber-600/50 p-6 rounded-xl shadow-lg animate-fade-in">
                        <h2 class="text-2xl font-bold mb-4 text-amber-400 flex items-center gap-2">🎁 意外的補給！</h2>
                        <p class="mb-4 text-gray-200">你在怪物的屍骸、古舊寶匣或破解的大型法陣中找到了發光的裝備。你可以帶走其中一件，或者選擇將其兌換成一瓶關鍵的治療藥水：</p>
                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 my-4">
                        ${gameState.currentLootItem.map(item => `
                            <div class="bg-black/60 border border-amber-500/50 p-4 rounded-lg flex flex-col justify-between">
                                <div>
                                    <span class="text-lg font-bold text-amber-300 block mb-1">【${item.name}】</span>
                                    <p class="text-xs text-gray-300 leading-relaxed">${item.desc}</p>
                                </div>
                                <p class="text-[10px] text-emerald-400 mt-2 font-mono border-t border-gray-800 pt-1">限制職業: ${item.restriction.join('、')}</p>
                            </div>
                        `).join('')}
                        </div>
                    </div>
                `;

                gameState.currentLootItem.forEach((item) => {
                    const canEquip = item.restriction.includes(gameState.player.name);
                    const btnEquip = document.createElement('button');
                    
                    if (canEquip) {
                        btnEquip.className = 'bg-emerald-700/80 hover:bg-emerald-600 p-4 rounded-xl font-bold text-white transition border border-emerald-500 shadow-lg w-full text-center';
                        btnEquip.innerHTML = `裝備 <span class="text-amber-200">${item.name}</span>`;

                            <p class="mb-4 text-lg">在連時間與光線都被吞噬的深淵最底層，傳奇首領冷冷地注視著你。</p>

                    } else if (randomLegBoss.isElvenArchmage) {
                        log(`⚡ 精靈傳奇大法師高傲宣告：「我無法被囚禁。我無法被控制。在你死前給我記住這點，你們這群永遠可悲，永遠愚蠢的螻蟻！」`, 'text-rose-400 font-bold text-lg animate-pulse');
                    } else if (randomLegBoss.name.includes('上古紅龍')) {
                        log(`🔥 上古紅龍發出低沉龍吼，空氣中瞬間燃起熊熊烈火：「小東西，迎接你的葬禮吧。」`, 'text-rose-400 font-bold text-lg animate-pulse');

                        log(`⚔️ 鎧甲男子發出振奮的回音：「我活過來了！擁有血、肉、還有骨頭！我還活著！哈哈！我曾發誓就算用抓的、用爬的也要回到活人的世界……而我做到了！"`, 'text-rose-400 font-bold text-lg animate-pulse');
                    } else if (randomLegBoss.isSahuaginPrince) {
                        log(`🌊 鯊化魚人親王昂首狂笑，重戟直指你心口：「卑微的陸地爬蟲，今日此處即為你的葬身之洋！」`, 'text-rose-400 font-bold text-lg animate-pulse');

                case 'victory':

                            <div class="text-6xl my-8">🎉👑💰</div>
                        </div>
                    `;
                    actions.className = 'flex justify-center items-center shrink-0 w-full max-w-xs mx-auto';
                    addActionButton('重新開始冒險', () => location.reload());
                    break;

                case 'legendary_victory':
                    playSynthSound('loot');
                    display.innerHTML = `
                        <div class="text-center space-y-6 animate-fade-in py-6">
                            <h2 class="text-5xl font-black text-amber-400 drop-shadow-[0_5px_15px_rgba(245,158,11,0.5)] mb-4 tracking-widest animate-pulse">👑 鑄就至高神話！ 👑</h2>

                    addActionButton('重新開始冒險', () => location.reload());

                case 'gameOver':

                    actions.className = 'flex justify-center items-center shrink-0 w-full max-w-xs mx-auto';

        function addActionButton(text, onClick) {
            const actions = document.getElementById('action-panel');
            const btn = document.createElement('button');
            btn.className = 'w-full bg-slate-700/80 hover:bg-slate-600 p-3 sm:p-4 rounded-xl border border-slate-500 font-bold text-white shadow-lg transition-all active:scale-95 text-center px-6';
            btn.textContent = text;
            btn.onclick = onClick;
            actions.appendChild(btn);
        }

        function startCombat(enemyData, nextScene) {
            enemyData.maxHp = enemyData.lockHp ? enemyData.hp : enemyData.hp; 
            
            let currentHp = enemyData.hp;
            Object.defineProperty(enemyData, 'hp', {
                get() { return currentHp; },
                set(value) {
                    let diff = currentHp - value; 
                    currentHp = currentHp - diff;
                    if (currentHp < 0) currentHp = 0;
                    if (currentHp > enemyData.maxHp) currentHp = enemyData.maxHp;
                },
                configurable: true
            });

            gameState.currentEnemy = enemyData;
            
            gameState.combatState = {
                rageTurns: 0,
                enemyProneTurns: 0,
                enemyBlindTurns: 0,
                enemyStunnedTurns: 0,
                enemyPoisonedTurns: 0, 
                barbarianReckless: false,
                stoneskinTurns: 0,
                barkskinTurns: 0,          
                enemyIntimidatedTurns: 0, 
                fatigueTurns: 0,          
                backstabCooldown: 0,
                playerStunnedTurns: 0,
                bossTurnCounter: 0,
                enemyStoneskinTurns: 0,
                playerFrozenTurns: 0,
                playerProneTurns: 0
            };
            
            if (gameState.player.abilities) {
                gameState.player.abilities.forEach(ab => {
                    if (ab.id === 'throw_sand') ab.cost = 4; // 提升為每場 4 次
                    if (ab.id === 'stun_strike') ab.cost = 3;
                    if (ab.id === 'flurry') ab.cost = 5;
                    if (ab.id === 'stoneskin') ab.cost = (gameState.player.name === '德魯伊') ? 1 : 2; 
                    if (ab.id === 'barkskin') ab.cost = 2;  
                    if (ab.id === 'fatigue_wave') ab.cost = 2;
                    if (ab.id === 'hold_person') ab.cost = 4;
                    if (ab.id === 'poison_dart') ab.cost = 3; 
                });
            }

            log(`==== 戰鬥開始！遭遇了 ${enemyData.name} ====`, 'text-rose-400 font-bold text-lg');
            gameState.scene = 'combat_' + nextScene; 
            updateStats();
            renderCombat(nextScene);
        }

        // ... [renderCombat, playerTurn, executeAttack] 已在此處保持完整 ...

        function renderCombat(nextScene) {
            const display = document.getElementById('story-display');
            const p = gameState.player;
            const e = gameState.currentEnemy;
            
            const pPct = Math.max(0, Math.floor((p.hp / p.maxHp) * 100));
            const ePct = Math.max(0, Math.floor((e.hp / e.maxHp) * 100));

            const activeFlying = e.isFlying && !(gameState.combatState.fatigueTurns > 0);
            
            const isEnemyGiant = (e.type === 'giant' || e.type === 'dragon' || e.type === 'monstrosity' || e.name.includes('巨人') || e.name.includes('巨怪') || e.name.includes('巨龍') || e.name.includes('紅龍') || e.name.includes('九頭蛇') || e.name.includes('炎魔') || e.name.includes('吞噬獸') || e.name.includes('眼魔') || e.name.includes('梟熊') || e.name.includes('男爵') || e.name.includes('親王')) && !e.name.includes('奪心魔');

            display.innerHTML = `
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 w-full h-full animate-fade-in font-sans font-medium">
                    
                    <!-- 冒險者卡牌 -->
                    <div id="player-combat-card" class="bg-slate-900/60 border border-indigo-500/30 rounded-xl p-4 flex flex-col justify-between shadow-lg">
                        <div>
                            <div class="flex justify-between items-center mb-1">
                                <h3 class="font-bold text-lg text-indigo-300">冒險者 (${p.name})</h3>
                                <span class="text-sm font-mono text-gray-400">🛡️ AC: <span id="card-player-ac" class="text-sky-300 font-bold">${p.currentAC}</span></span>
                            </div>
                            
                            <div class="text-xs text-indigo-200/90 font-mono mb-2 bg-indigo-950/40 p-1.5 rounded border border-indigo-900/30 flex justify-between">
                                <span>⚔️ 命中加成: <span id="card-player-hit-val" class="font-bold text-amber-300">+${p.currentAtkBonus}</span></span>
                                <span>💥 傷害骰: <span id="card-player-dmg-val" class="font-bold text-amber-300">1D${gameState.player.baseDmgDie}+${gameState.player.baseDmgBonus + p.currentDmgBonus}</span></span>
                            </div>

                            <div class="w-full bg-slate-800 rounded-full h-4 overflow-hidden mb-2 border border-slate-700">
                                <div id="card-player-hp-bar" class="bg-gradient-to-r from-red-500 via-emerald-500 to-green-400 h-full transition-all duration-300" style="width: ${pPct}%"></div>
                            </div>
                            <div class="flex justify-between items-center text-xs">
                                <span class="font-mono text-rose-300 font-bold"><span id="card-player-hp">${p.hp}</span> / <span id="card-player-max-hp">${p.maxHp}</span> HP</span>
                                <span id="card-player-hp-pct" class="text-gray-400">${pPct}%</span>
                            </div>
                        </div>
                        <div class="mt-3 border-t border-slate-800/80 pt-2 flex flex-wrap gap-1.5 items-center">
                            <span class="text-xs text-gray-400 font-mono">狀態:</span>
                            <div id="card-player-buffs" class="flex flex-wrap gap-1"></div>
                        </div>
                    </div>

                    <!-- 敵方卡牌 -->
                    <div id="enemy-combat-card" class="bg-slate-900/60 border border-rose-500/30 rounded-xl p-4 flex flex-col justify-between shadow-lg">
                        <div>
                            <div class="flex justify-between items-start mb-1">
                                <div>
                                    <h3 class="font-bold text-lg text-rose-400 flex items-center gap-2">👹 ${e.name}</h3>
                                    <div class="text-xs text-amber-400/80 mt-0.5 font-mono flex flex-wrap gap-1">
                                        <span class="bg-red-950 border border-red-800 px-1.5 py-0.5 rounded text-[10px] text-rose-300 font-semibold mr-1">${e.type.toUpperCase()}</span>
                                        ${isEnemyGiant ? '<span class="text-[10px] bg-amber-950 text-amber-300 border border-amber-800 px-1.5 py-0.5 rounded font-bold animate-pulse">🪐巨型</span>' : ''}
                                        ${e.fireImmune ? '<span class="text-[10px] bg-orange-950 text-orange-300 px-1 rounded">🔥火免</span>' : ''} 
                                        ${e.fireWeak ? '<span class="text-[10px] bg-red-900 text-red-100 px-1 rounded animate-pulse">🔥怕火</span>' : ''} 
                                        ${e.coldImmune ? '<span class="text-[10px] bg-sky-950 text-sky-200 px-1 rounded">❄️冰免</span>' : ''} 
                                        ${e.coldWeak ? '<span class="text-[10px] bg-blue-900 text-blue-100 px-1 rounded animate-pulse">❄️怕冰</span>' : ''} 
                                        ${e.lightningWeak ? '<span class="text-[10px] bg-yellow-950 text-yellow-300 px-1.5 py-0.5 rounded animate-pulse font-bold">⚡怕電</span>' : ''}
                                        ${activeFlying ? '<span class="text-[10px] bg-stone-800 text-stone-200 px-1 rounded">✈️飛行</span>' : ''} 
                                        ${e.legs > 2 ? `<span class="text-[10px] bg-stone-800 text-stone-200 px-1 rounded">🦵多足(${e.legs})</span>` : ''}
                                    </div>
                                </div>
                                <div class="flex flex-col items-end">
                                    <span class="text-sm font-mono text-gray-400">🛡️ AC: <span id="card-enemy-ac" class="text-sky-300 font-bold">${e.ac - (gameState.combatState.enemyProneTurns > 0 ? 4 : 0)}</span></span>
                                </div>
                            </div>

                            <div class="text-xs text-rose-200/90 font-mono mb-2 bg-rose-950/40 p-1.5 rounded border border-rose-900/30 flex justify-between">
                                <span>⚔️ 攻擊加成: <span class="font-bold text-amber-300">+${Math.floor(e.dmg / 2) + (e.hitBonus || 0)}</span></span>
                                <span>💥 傷害骰: <span class="font-bold text-amber-300">1D${e.dmg}+${e.dmgBonus !== undefined ? e.dmgBonus : 2}</span></span>
                            </div>

                            <div class="w-full bg-slate-800 rounded-full h-4 overflow-hidden mb-2 border border-slate-700">
                                <div id="card-enemy-hp-bar" class="bg-gradient-to-r from-red-600 to-rose-400 h-full transition-all duration-300" style="width: ${ePct}%"></div>
                            </div>
                            <div class="flex justify-between items-center text-xs">
                                <span class="font-mono text-rose-300 font-bold"><span id="card-enemy-hp">${e.hp}</span> / <span id="card-enemy-max-hp">${e.maxHp}</span> HP</span>
                                <span id="card-enemy-hp-pct" class="text-gray-400">${ePct}%</span>
                            </div>
                        </div>
                        <div class="mt-3 border-t border-slate-800/80 pt-2 flex flex-wrap gap-1.5 items-center">
                            <span class="text-xs text-gray-400 font-mono">狀態:</span>
                            <div id="card-enemy-debuffs" class="flex flex-wrap gap-1"></div>
                        </div>
                    </div>

                </div>
            `;

            const actions = document.getElementById('action-panel');
            actions.className = 'grid grid-cols-1 sm:grid-cols-2 gap-3 sm:gap-4 shrink-0 min-h-[60px]';
            actions.innerHTML = '';
            
            if (gameState.combatState.playerStunnedTurns > 0) {
                 const btnStunned = document.createElement('button');
                 btnStunned.className = 'bg-purple-900/80 p-4 rounded-xl font-bold text-purple-200 border border-purple-500 col-span-1 sm:col-span-2 text-center animate-pulse';
                 btnStunned.innerHTML = `🌀 你的精神遭到麻痺！(剩餘 ${gameState.combatState.playerStunnedTurns} 回合) [點擊跳過回合]`;
                 btnStunned.onclick = () => {
                      gameState.combatState.playerStunnedTurns--;
                      log(`🌀 你努力重組破碎的心智... 跳過本回合的行動。`, 'text-purple-300 italic');
                      updateStats();
                      
                      actions.innerHTML = '<div class="col-span-1 sm:col-span-2 text-center text-rose-300 py-4 font-bold animate-pulse flex justify-center items-center h-full">⚔️ 雙方交鋒中...</div>';
                      setTimeout(() => {
                          enemyTurn(nextScene);
                      }, 1000);
                 };
                 actions.appendChild(btnStunned);
                 updateStats();
                 return;
            }

            if (gameState.combatState.playerProneTurns > 0) {
                 const btnProne = document.createElement('button');
                 btnProne.className = 'bg-amber-900/80 p-4 rounded-xl font-bold text-amber-200 border border-amber-500 col-span-1 sm:col-span-2 text-center animate-pulse';
                 btnProne.innerHTML = `🧼 你摔倒在地上！(剩餘 ${gameState.combatState.playerProneTurns} 回合) [點擊掙扎站起並跳過回合]`;
                 btnProne.onclick = () => {
                      gameState.combatState.playerProneTurns--;
                      log(`🧼 你在冰冷的地面上艱難站起... 本回合無法進行其他動作。`, 'text-amber-300 italic');
                      updateStats();
                      
                      actions.innerHTML = '<div class="col-span-1 sm:col-span-2 text-center text-rose-300 py-4 font-bold animate-pulse flex justify-center items-center h-full">⚔️ 雙方交鋒中...</div>';
                      setTimeout(() => {
                          enemyTurn(nextScene);
                      }, 1000);
                 };
                 actions.appendChild(btnProne);
                 updateStats();
                 return;
            }

            const btnAttack = document.createElement('button');
            btnAttack.className = 'bg-rose-700/80 hover:bg-rose-600 p-3 sm:p-4 rounded-xl font-bold text-white shadow-lg border border-rose-500 transition-all active:scale-95 flex flex-col items-center justify-center';
            btnAttack.innerHTML = `<div class="text-lg">🗡️ 普通物理攻擊</div><span class="text-xs font-normal opacity-80 mt-1">命中加成: +${gameState.player.currentAtkBonus}</span>`;
            btnAttack.onclick = () => playerTurn(nextScene, { type: 'attack' });
            actions.appendChild(btnAttack);

            if (gameState.player.abilities) {
                gameState.player.abilities.forEach(ability => {
                    const btnAbility = document.createElement('button');
                    
                    if (ability.id === 'shield') {
                        btnAbility.className = 'bg-gray-800/80 p-3 sm:p-4 rounded-xl font-bold text-gray-500 cursor-not-allowed border border-gray-700 flex flex-col justify-center items-center';
                        btnAbility.innerHTML = `<div class="text-lg">🛡️ ${ability.name}</div><span class="text-xs font-normal opacity-80 mt-1">被動觸發 (剩餘: ${ability.cost})</span>`;
                    } else if (ability.cost !== 'inf' && ability.cost <= 0) {
                        btnAbility.className = 'bg-gray-800/80 p-3 sm:p-4 rounded-xl font-bold text-gray-500 cursor-not-allowed border border-gray-700 flex flex-col justify-center items-center';
                        btnAbility.innerHTML = `<div class="text-lg">${ability.name}</div><span class="text-xs font-normal opacity-80 mt-1">次數已耗盡</span>`;
                    } else if (ability.id === 'backstab' && gameState.combatState.backstabCooldown > 0) {
                        btnAbility.className = 'bg-gray-800/80 p-3 sm:p-4 rounded-xl font-bold text-gray-500 cursor-not-allowed border border-gray-700 flex flex-col justify-center items-center text-center';
                        btnAbility.innerHTML = `<div class="text-lg">🔪 ${ability.name}</div><span class="text-xs font-normal opacity-80 mt-1">冷卻中 (剩餘 ${gameState.combatState.backstabCooldown} 回合)</span>`;
                        btnAbility.disabled = true;
                    } else if (ability.id === 'sneak_attack' && gameState.combatState.enemyBlindTurns <= 0) {
                        btnAbility.className = 'bg-gray-800/80 p-3 sm:p-4 rounded-xl font-bold text-gray-500 cursor-not-allowed border border-gray-700 flex flex-col justify-center items-center text-center';
                        btnAbility.innerHTML = `<div class="text-lg">🗡️ ${ability.name}</div><span class="text-xs font-normal opacity-80 mt-1">需要敵人處於目盲狀態</span>`;
                    } else {
                        btnAbility.className = 'bg-indigo-700/80 hover:bg-indigo-600 p-3 sm:p-4 rounded-xl font-bold text-white shadow-lg border border-indigo-500 transition-all active:scale-95 text-left flex flex-col justify-between';
                        const costText = ability.cost === 'inf' ? '無限次' : `剩 ${ability.cost} 次`;
                        let icon = '✨';
                        if(ability.id === 'heavy_strike') icon = '💥';
                        if(ability.id === 'intimidate') icon = '💢';
                        if(ability.id === 'backstab') icon = '🔪';
                        if(ability.id === 'throw_sand') icon = '💨';
                        if(ability.id === 'sneak_attack') icon = '🗡️';
                        if(ability.id === 'poison_dart') icon = '🎯';
                        if(ability.id === 'heal' || ability.id === 'turn_undead') icon = '✝️';
                        if(ability.id === 'divine_smite') icon = '⚔️';
                        if(ability.id === 'brutal_strike') icon = '🪓';
                        if(ability.id === 'rage') icon = '🔥';
                        if(ability.id.includes('fireball')) icon = '🔥';
                        if(ability.id === 'fatigue_wave') icon = '🌀';
                        if(ability.id.includes('magic_missile')) icon = '🔵'; 
                        if(ability.id === 'grease') icon = '🧪';
                        if(ability.id === 'blind') icon = '👁️';
                        if(ability.id === 'stoneskin') icon = '🧱';
                        if(ability.id === 'barkskin') icon = '🌿';
                        if(ability.id === 'stun_strike') icon = '⚡';
                        if(ability.id === 'flurry') icon = '🤜';
                        if(ability.id === 'sweep') icon = '🦵';
                        if(ability.id === 'finger_of_death') icon = '💀';
                        if(ability.id === 'blizzard') icon = '❄️';
                        if(ability.id === 'hold_person') icon = '⛓️';
                        if(ability.id === 'sunburst') icon = '☀️';
                        if(ability.id === 'call_lightning') icon = '⚡';
                        
                        let customDesc = ability.desc;
                        if (ability.id === 'sweep' && (gameState.player.name === '戰士' || gameState.player.name === '武僧')) {
                            const hasShield = !!gameState.gear.shield;
                            const hasStaff = gameState.gear.weapon && gameState.gear.weapon.id === 'staff_p1';
                            const reductionActive = hasShield || hasStaff;
                            const weaponReason = hasShield ? "裝備了精鋼盾牌" : (hasStaff ? "裝備了魔力法杖" : "");
                            customDesc = reductionActive 
                                ? `物理戰技：已啟動${weaponReason}優勢！命中懲罰由 -5 減輕至 -2！擊中將使非飛行/非植物對手跌倒並無法行動 1+1D3 回合且 AC-4。`
                                : `物理戰技：命中-5。若裝備長杖（武僧/戰士適用）或盾牌（僅戰士適用）可使命中懲罰減輕至 -2。擊中使對手跌倒且無法行動 1+1D3 回合且 AC-4。`;
                        }

                        btnAbility.innerHTML = `
                            <div class="flex justify-between items-center w-full">
                                <span class="text-lg">${icon} ${ability.name}</span> 
                                <span class="text-xs bg-indigo-900/50 px-2 py-1 rounded">${costText}</span>
                            </div>
                            <div class="text-xs font-normal mt-2 opacity-90 text-indigo-100">${customDesc}</div>
                        `;
                        btnAbility.onclick = () => playerTurn(nextScene, { type: 'ability', ability: ability });
                    }
                    actions.appendChild(btnAbility);
                });
            }

            const btnUsePot = document.createElement('button');
            if (gameState.potions > 0) {
                btnUsePot.className = 'bg-emerald-800/80 hover:bg-emerald-700 p-3 sm:p-4 rounded-xl font-bold text-white border border-emerald-500 shadow-lg transition-all active:scale-95 flex flex-col justify-center items-center col-span-1 sm:col-span-2';
                btnUsePot.innerHTML = `<div class="text-lg">🧪 飲用治療藥水 (恢復20點HP)</div><span id="combat-potion-count" class="text-xs font-normal opacity-80">剩餘數量: ${gameState.potions} 瓶 (消耗1回合行動)</span>`;
                btnUsePot.onclick = () => usePotionInCombat(nextScene);
            } else {
                btnUsePot.className = 'bg-gray-800/80 p-3 sm:p-4 rounded-xl font-bold text-gray-500 cursor-not-allowed border border-gray-700 flex flex-col justify-center items-center col-span-1 sm:col-span-2';
                btnUsePot.innerHTML = `<div class="text-lg">❌ 藥水已耗盡</div><span id="combat-potion-count" class="text-xs font-normal opacity-80">無可用儲備</span>`;
                btnUsePot.disabled = true;
            }
            actions.appendChild(btnUsePot);

            updateStats();
        }

        function playerTurn(nextScene, action) {
            const actions = document.getElementById('action-panel');
            actions.innerHTML = '<div class="col-span-1 sm:col-span-2 text-center text-rose-300 py-4 font-bold animate-pulse flex justify-center items-center h-full">⚔️ 雙方交鋒中...</div>';
            
            let enemyAlive = true;
            
            if (action.type === 'attack') {
                enemyAlive = executeAttack(nextScene);
            } else if (action.type === 'ability') {
                enemyAlive = executeAbility(action.ability, nextScene);
            }
            
            updateStats();
            
            if (gameState.player.hp <= 0) {
                renderScene('gameOver');
                return;
            }

            if (enemyAlive) {
                const enemyCard = document.getElementById('enemy-combat-card');
                if (enemyCard) {
                    enemyCard.classList.remove('shake');
                    void enemyCard.offsetWidth; 
                    enemyCard.classList.add('shake');
                }
                
                setTimeout(() => {
                    enemyTurn(nextScene);
                }, 1000); 
            }
        }

        function executeAttack(nextScene) {
            const enemy = gameState.currentEnemy;
            const hitRoll = roll(20);
            const atkBonus = gameState.player.currentAtkBonus;
            
            let finalRoll = hitRoll;
            if (gameState.combatState.enemyBlindTurns > 0 || gameState.combatState.enemyStunnedTurns > 0) {
                 finalRoll = Math.max(hitRoll, roll(20));
            }
            
            const hitTotal = finalRoll + atkBonus;
            let targetAC = enemy.ac;
            if (gameState.combatState.enemyProneTurns > 0) targetAC -= 4;
            
            if (hitTotal >= targetAC || hitRoll === 20) {
                const critThreshold = getCritThreshold();
                let isCrit = (hitRoll >= critThreshold);
                if (isCrit && enemy.isArmorMan) {
                    isCrit = false;
                    log(`🛡️ [不朽血脈] 鎧甲男子戴著不朽角盔，周身邪火大盛，【免疫】了重擊的加倍傷害！(此次攻擊僅造成普通傷害)`, 'text-sky-400 font-bold');
                }
                let dmg = roll(gameState.player.baseDmgDie) + gameState.player.baseDmgBonus + gameState.player.currentDmgBonus;
                if (isCrit) dmg *= 2;
                
                enemy.hp -= dmg;
                playSynthSound('hit');
                if (isCrit) {
                     log("致命一擊！(投出 " + hitRoll + " >= 門檻 " + critThreshold + ") 造成 " + dmg + " 點物理傷害！", 'text-amber-400 font-bold');
                } else {
                     log("物理攻擊命中 (總和 " + hitTotal + ")，造成 " + dmg + " 點傷害。", 'text-emerald-300');
                }
            } else {
                log("攻擊未命中 (投出 " + finalRoll + "+" + atkBonus + "=" + hitTotal + " < 目標AC " + targetAC + ")。", 'text-gray-400');
            }
            
            return checkCombatEnd(nextScene);
        }

        function executeAbility(ability, nextScene) {
            if (ability.cost !== 'inf' && ability.cost <= 0) return true;
            if (ability.cost !== 'inf') ability.cost--;

            const enemy = gameState.currentEnemy;
            const player = gameState.player;
            playSynthSound('spell');
            
            const spellDC = 10 + player.spellBonus;

            if (ability.id === 'divine_smite') {
                let hitRoll = roll(20);
                if (gameState.combatState.enemyBlindTurns > 0 || gameState.combatState.enemyStunnedTurns > 0) {
                    hitRoll = Math.max(hitRoll, roll(20));
                }
                const hitTotal = hitRoll + player.currentAtkBonus;
                if (hitTotal >= enemy.ac || hitRoll === 20) {
                     const critThreshold = getCritThreshold();
                     let isCrit = (hitRoll >= critThreshold);
                     if (isCrit && enemy.isArmorMan) {
                         isCrit = false;
                         log(`🛡️ [不朽血脈] 鎧甲男子【免疫】了重擊的加倍效果！(神聖重擊僅造成普通傷害)`, 'text-sky-400 font-bold');
                     }
                     let physDmg = roll(player.baseDmgDie) + player.baseDmgBonus + player.currentDmgBonus;
                     if(isCrit) physDmg *= 2;
                     
                     let smiteDmg = 6;
                     let totalDmg = physDmg + smiteDmg;
                     
                     const isTargetSpec = (enemy.type === 'undead' || enemy.type === 'aberration');
                     if (isTargetSpec) {
                         totalDmg *= 2; 
                     }
                     
                     enemy.hp -= totalDmg;
                     log("[神聖打擊] 命中！物理 " + physDmg + " + 神聖 " + smiteDmg + " = 總計 " + totalDmg + " 點傷害！" + (isTargetSpec ? ' 🎯 (對不死/異怪生物造成傷害翻倍!)' : ''), 'text-amber-300 font-bold');
                } else {
                     log("[神聖打擊] 攻擊未命中，神聖之力消散。", 'text-gray-400');
                }
            } 
            else if (ability.id === 'hold_person') {
                if (enemy.type === 'humanoid') {
                    const isBoss = enemy.name.includes('BOSS');
                    if (isBoss) {
                        log("[人類定身術] ⛓️ 吟唱神聖定身律令！[" + enemy.name + "] 具有強大的頭目意志，試圖抵抗束縛...", 'text-indigo-300');
                        let resistThreshold = enemy.isElvenArchmage ? 75 : 50;
                        if (roll(100) <= resistThreshold) {
                            log("[人類定身術] 🛡️ 抵抗成功！[" + enemy.name + "] 憑藉奧術氣場強行震散了定身能量！", 'text-orange-400 font-semibold');
                        } else {
                            gameState.combatState.enemyStunnedTurns = 5;
                            log("[人類定身術] ✨ 成功！定身律令生效！頭目 [" + enemy.name + "] 身體僵鎖！陷入「震懾」狀態 (5回合)，無法行動且受攻擊時我方獲得判定優勢！", 'text-indigo-400 font-bold animate-pulse');
                        }
                    } else {
                        gameState.combatState.enemyStunnedTurns = 5;
                        log("[人類定身術] ✨ 成功！定身律令直接生效！[" + enemy.name + "] 身體瞬間僵縮！陷入「震懾」狀態 (5回合)，無法行動且受攻擊時我方獲得判定優勢！", 'text-indigo-400 font-bold animate-pulse');
                    }
                } else {
                    log("[人類定身術] ❌ 失敗：定身律令僅對類人生物 (humanoid) 有效，[" + enemy.name + "] (" + enemy.type + ") 完全免疫此奧法！", 'text-gray-400');
                }
            }
            else if (ability.id === 'sunburst') {
                let baseDmg = roll(6) + roll(6) + roll(6) + roll(6) + roll(6) + roll(6) + player.spellBonus;
                const isTargetSpec = (enemy.type === 'undead' || enemy.type === 'aberration');
                if (isTargetSpec) {
                    baseDmg *= 2; 
                }
                enemy.hp -= baseDmg;
                gameState.combatState.enemyBlindTurns = 2 + roll(6);
                
                log("[陽炎爆] ☀️ 烈陽破曉！萬道璀璨金芒爆散！對 [" + enemy.name + "] 造成 " + baseDmg + " 點神聖傷害" + (isTargetSpec ? ' 🎯 (對不死/異怪生物造成雙倍毀滅傷害!)' : ''), 'text-yellow-400 font-bold text-lg animate-pulse');
            }
            else if (ability.id === 'call_lightning') {
                const activeFlying = enemy.isFlying && !(gameState.combatState.fatigueTurns > 0);
                const isLightningWeak = !!enemy.lightningWeak;
                let dmg = roll(6) + roll(6) + player.spellBonus;
                
                if (activeFlying || isLightningWeak) {
                    dmg *= 2;
                    enemy.hp -= dmg;
                    let reason = activeFlying ? "浮空飛行" : "潮濕導電";
                    log(`[落雷術] ⚡⚡ 狂雷擊頂！天雷直擊${reason}的 [${enemy.name}]，引發雙倍導電傷害！共造成 ${dmg} 點閃電傷害！${player.spellBonus > 0 ? " (含裝備共鳴加成)" : ""}`, 'text-yellow-300 font-black animate-pulse text-lg');
                } else {
                    enemy.hp -= dmg;
                    log(`[落雷術] ⚡ 召喚天雷直擊！對 [${enemy.name}] 造成 ${dmg} 點閃電傷害！${player.spellBonus > 0 ? " (受裝備魔法能量共鳴加成 +" + player.spellBonus + " 點傷害!)" : ""}`, 'text-sky-300 font-bold animate-pulse');
                }
            }
            else if (ability.id === 'fireball') {
                if (enemy.fireImmune) {
                    log("[火球術] 对 [" + enemy.name + "] 释放！但是对手具有火系免疫特性，造成 0 點傷害！", 'text-rose-400 font-bold');
                } else {
                    const isPlantOrWeak = enemy.type === 'plant' || enemy.fireWeak;
                    let dmg = (roll(6) + player.spellBonus) + (roll(6) + player.spellBonus) + (roll(6) + player.spellBonus);
                    if (isPlantOrWeak) {
                        dmg *= 2;
                        enemy.hp -= dmg;
                        log("[火球術] 🔥 烈焰爆發！對具有怕火/冰雪特性的生物 [" + enemy.name + "] 造成雙倍燃燒傷害！共計 " + dmg + " 點火焰傷害！", 'text-orange-500 font-bold text-lg animate-pulse');
                    } else {
                        enemy.hp -= dmg;
                        log("[火球術] 爆發！造成 " + dmg + " 點火焰傷害！", 'text-orange-400 font-bold');
                    }
                }
            } else if (ability.id === 'fireball_sorcerer') {
                if (enemy.fireImmune) {
                    log("[強效火球術] 对 [" + enemy.name + "] 释放！但是对手具有火系免疫特性，造成 0 點傷害！", 'text-rose-400 font-bold');
                } else {
                    const isPlantOrWeak = enemy.type === 'plant' || enemy.fireWeak;
                    let dmg = (roll(6) + player.spellBonus) + (roll(6) + player.spellBonus) + (roll(6) + player.spellBonus) + (roll(6) + player.spellBonus);
                    if (isPlantOrWeak) {
                        dmg *= 2;
                        enemy.hp -= dmg;
                        log("[強效火球術] 🔥🔥 劇烈爆發！對具有怕火/冰雪特性的生物 [" + enemy.name + "] 造成雙倍燃燒傷害！共計 " + dmg + " 點火焰傷害！", 'text-orange-500 font-bold text-lg animate-pulse');
                    } else {
                        enemy.hp -= dmg;
                        log("[強效火球術] 劇烈爆發！造成 " + dmg + " 點火焰傷害！", 'text-orange-500 font-bold text-lg');
                    }
                }
            } else if (ability.id === 'blizzard') {
                const isFireOrColdWeak = enemy.fireImmune || enemy.coldWeak || enemy.name.includes('炎魔') || enemy.name.includes('雙頭犬') || enemy.name.includes('巨龍') || enemy.name.includes('紅龍') || enemy.type === 'dragon';
                let dmg = (roll(6) + player.spellBonus) + (roll(6) + player.spellBonus) + (roll(6) + player.spellBonus);
                if (enemy.coldImmune) {
                    log("[雪風暴] ❄️ 對冰霜免疫的生物 [" + enemy.name + "] 無效！造成 0 點傷害！", 'text-cyan-600 font-bold');
                } else if (isFireOrColdWeak) {
                    dmg *= 2;
                    enemy.hp -= dmg;
                    log("[雪風暴] ❄️ 狂風暴雪席捲！對怕冰/極熱特性生物 [" + enemy.name + "] 造成雙倍極寒凍結傷害！共計 " + dmg + " 點冰霜傷害！", 'text-cyan-400 font-bold text-lg animate-pulse');
                } else {
                    enemy.hp -= dmg;
                    log("[雪風暴] ❄️ 暴雪降臨！造成 " + dmg + " 點冰霜傷害！", 'text-cyan-300 font-bold');
                }
            } 
            else if (ability.id === 'fatigue_wave') {
                if (enemy.type === 'undead') {
                    log("[力竭波] 對沒有血肉的不死生物 [" + enemy.name + "] 無效！", 'text-gray-400');
                } else {
                    const duration = roll(6) + 2; 
                    gameState.combatState.fatigueTurns = duration;
                    log("[力竭波] 🌀 綠色衰弱光波席捲！[" + enemy.name + "] 全身肌肉脫力！其命中與傷害降低 3 點 (持續 " + duration + " 回合)。", 'text-sky-300 font-bold animate-pulse');

                    if (enemy.isFlying) {
                        const isGiant = (enemy.type === 'giant' || enemy.type === 'dragon' || enemy.type === 'monstrosity' || enemy.name.includes('巨人') || enemy.name.includes('巨怪') || enemy.name.includes('巨龍') || enemy.name.includes('紅龍') || enemy.name.includes('九頭蛇') || enemy.name.includes('炎魔') || enemy.name.includes('吞噬獸') || enemy.name.includes('眼魔') || enemy.name.includes('梟熊') || enemy.name.includes('男爵') || enemy.name.includes('親王')) && !enemy.name.includes('奪心魔');
                        let fallDmg = 0;
                        if (isGiant) {
                            fallDmg = roll(6) + roll(6) + roll(6) + roll(6) + roll(6); 
                            log("[墜落] 🌀 [" + enemy.name + "] 忽然脫力，重墜地面！造成 " + fallDmg + " 點墜落傷害！", 'text-rose-400 font-bold text-lg animate-pulse');
                        } else {
                            fallDmg = roll(6) + roll(6) + roll(6); 
                            log("[墜落] 🌀 [" + enemy.name + "] 失去飛行能力摔在地上，受到 " + fallDmg + " 點墜落傷害！", 'text-rose-300 font-bold');
                        }
                        enemy.hp -= fallDmg;
                    }
                }
            } else if (ability.id === 'magic_missile') {
                const dmg = roll(3) + roll(3) + roll(3) + (player.spellBonus * 3); 
                enemy.hp -= dmg;
                log("[魔法飛彈] 3發全數命中！共造成 " + dmg + " 點奧術傷害！", 'text-sky-300 font-bold');
            } else if (ability.id === 'magic_missile_sorcerer') {
                const dmg = roll(3) + roll(3) + roll(3) + roll(3) + (player.spellBonus * 4);
                enemy.hp -= dmg;
                log("[強效魔法飛彈] 4發狂風驟雨般命中！共造成 " + dmg + " 點奧術傷害！", 'text-sky-400 font-bold text-lg');
            } 
            else if (ability.id === 'grease') {
                const activeFlying = enemy.isFlying && !(gameState.combatState.fatigueTurns > 0);
                if (activeFlying) {
                    log("[油膩術] 敵人是飛行生物，不受地面油膩影響！", 'text-gray-400');
                } else {
                    let successChance = (enemy.legs > 2) ? 30 : 60; 
                    
                    const currentSpellBonus = player.spellBonus || 0;
                    const bonusPercent = currentSpellBonus * 10;
                    successChance += bonusPercent;
                    successChance = Math.min(95, successChance); 

                    if (enemy.isElvenArchmage) {
                        successChance = Math.floor(successChance / 2);
                    }

                    let bonusLog = "";
                    if (currentSpellBonus > 0) {
                        const activeGears = [];
                        if (gameState.gear.weapon && gameState.gear.weapon.id === 'staff_p1') activeGears.push("魔力法杖+1");
                        if (gameState.gear.amulet && gameState.gear.amulet.id === 'caster_amulet') activeGears.push("星空護身符");
                        bonusLog = " (受【" + activeGears.join('與') + "】共鳴加值：+" + bonusPercent + "% 成功率)";
                    }
                    if (enemy.isElvenArchmage) {
                        bonusLog += " [傳奇大法師魔抗：成功率減半]";
                    }

                    log("[油膩術] 🧪 潑灑滑溜油脂！(基礎率: " + ((enemy.legs > 2)? '30% (多足)' : '60%') + bonusLog + " = 總成功率 " + successChance + "%)", 'text-indigo-300');
                    if (roll(100) <= successChance) {
                        gameState.combatState.enemyProneTurns = 2 + roll(6);

                     const saveTotal = saveRoll + dexSaveBonus;
                     const saveDC = 13;
                     
                     log(`🐉 [${enemy.name}] 狂吼著對你噴吐【烈焰吐息】！你急忙飛身閃避，進行 敏捷豁免檢定 (難度 DC ${saveDC})...`, 'text-orange-300');
                     let saveSuccess = saveTotal >= saveDC;
                     if (saveSuccess) {
                          dmg = Math.floor(dmg / 2);
                          log(`✨ 豁免成功！(敏捷骰: ${saveRoll} + 修正: ${dexSaveBonus} = ${saveTotal} >= ${saveDC})。你靈巧地閃過了火焰核心，傷害減半！`, 'text-emerald-400 font-bold');
                     } else {
                          log(`❌ 豁免失敗！(敏捷骰: ${saveRoll} + 修正: ${dexSaveBonus} = ${saveTotal} < ${saveDC})。你被滾燙的熱浪正面吞噬！`, 'text-rose-400 font-semibold');
                     }
                     
                     if (gameState.combatState.barkskinTurns > 0) {
                         dmg = Math.floor(dmg * 1.5);
                         log("🐉 [" + enemy.name + "] 狂吼著對你噴吐【烈焰吐息】！因你正處於 [樹膚術]，受到 " + dmg + " 點火焰傷害！ (無視 AC)", 'text-orange-400 font-bold animate-pulse');
                     } else if (gameState.combatState.stoneskinTurns > 0) {
                         dmg = Math.floor(dmg / 2);
                         log("🐉 [" + enemy.name + "] 狂吼著對你噴吐【烈焰吐息】！但你的 [石膚術] 抵擋了衝擊，你受到 " + dmg + " 點火焰傷害！ (無視 AC)", 'text-rose-400 font-bold');
                     } else {
                         log("🐉 [" + enemy.name + "] 狂吼著對你噴吐【烈焰吐息】！你受到 " + dmg + " 點烈焰灼燒！ (無視 AC)", 'text-rose-500 font-bold');
                     }
                     gameState.player.hp -= dmg;
                 } 
                 else if (enemy.name.includes('巫妖') || enemy.name.includes('幽魂') || enemy.isDemilich) {
                     let dmg = 8 - enemyDmgDebuff;
                     if (dmg < 1) dmg = 1;
                     if (gameState.combatState.stoneskinTurns > 0) dmg = Math.floor(dmg / 2);
                     gameState.player.hp -= dmg;
                     enemy.hp = Math.min(enemy.maxHp, enemy.hp + dmg);
                     log("🩸 [" + enemy.name + "] 施展【靈魂虹吸】，你感到生命力被抽乾！你受到 " + dmg + " 點傷害，敵人回復了 " + dmg + " 點生命值！", 'text-fuchsia-400 font-bold');
                 } 
                 else if (enemy.name.includes('眼魔')) {
                     let dmg = 10 - enemyDmgDebuff;
                     if (dmg < 1) dmg = 1;
                     if (gameState.combatState.stoneskinTurns > 0) dmg = Math.floor(dmg / 2);
                     gameState.player.hp -= dmg;
                     gameState.player.currentAC -= 1;
                     log("👁️ [眼魔暴君] 釋放了灰色【解體射線】！你受到 " + dmg + " 點傷害，且防禦力場遭到瓦解 (AC-1)！", 'text-purple-400 font-bold');
                 } 
                 else if (enemy.name.includes('虛空')) {
                     let dmg = 6 - enemyDmgDebuff;
                     if (dmg < 1) dmg = 1;
                     if (gameState.combatState.stoneskinTurns > 0) dmg = Math.floor(dmg / 2);
                     gameState.player.hp -= dmg;
                     gameState.player.currentAtkBonus -= 2;
                     log("🌌 [虛空吞噬獸] 發動【虛空重力壓制】！你受到 " + dmg + " 點傷害，且空間扭曲導致下回合命中率降低 -2！", 'text-sky-300 font-bold');
                 } 
                 else if (enemy.isElderBrain || enemy.name.includes('奪心魔')) {
                     let dmg = 9 - enemyDmgDebuff;
                     if (dmg < 1) dmg = 1;
                     if (gameState.combatState.stoneskinTurns > 0) dmg = Math.floor(dmg / 2);
                     gameState.player.hp -= dmg;
                     log("🧠 [" + enemy.name + "] 爆發強大【心靈波衝擊】，將心靈亂流直灌你的大腦，造成了 " + dmg + " 點心靈傷害！", 'text-fuchsia-400 font-bold');
                 }
                 else {
                     let dmg = Math.floor((roll(enemy.dmg) + 4) * 1.5) - enemyDmgDebuff;
                     if (dmg < 1) dmg = 1;
                     
                     const isFireEnemy = enemy.fireImmune || enemy.name.includes('炎魔');
                     if (gameState.combatState.barkskinTurns > 0 && isFireEnemy) {
                         dmg = Math.floor(dmg * 1.5);
                         log("⚠️ [警告] 因身上覆蓋著 [樹膚術]，遭受來自 " + enemy.name + " 的火焰重擊傷害增至 1.5 倍！", 'text-orange-400 font-bold');
                     } else if (gameState.combatState.stoneskinTurns > 0) {
                         dmg = Math.floor(dmg / 2);
                     }
                     gameState.player.hp -= dmg;
                     log("💥 [" + enemy.name + "] 爆發一記【傳奇狂擊】！突破了防禦造成 " + dmg + " 點傷害！", 'text-rose-500 font-bold');
                 }
                 
                 updateStats();
                 const statsPanel = document.getElementById('stats-panel');
                 statsPanel.classList.remove('shake');
                 void statsPanel.offsetWidth;
                 statsPanel.classList.add('shake');
                 
                 if (gameState.player.hp <= 0) {
                     renderScene('gameOver');
                     return;
                 }
             } 
             else {
                 if (enemy.isMarilith) {
                      log("⚔️ 傳奇六臂蛇魔猛烈揮舞六柄寒光閃閃的長刀，爆發【六臂連擊】！(普通攻擊進行 6 次)", 'text-rose-400 font-extrabold animate-pulse');
                      for (let k = 1; k <= 6; k++) {
                           if (gameState.player.hp <= 0) break;
                           const mHitRoll = roll(20);
                           let finalMHit = mHitRoll;
                           if (hasDisadvantage) finalMHit = Math.min(mHitRoll, roll(20));
                           const mHitTotal = finalMHit + 6 - enemyHitDebuff;
                           
                           if (mHitTotal >= currentAC || finalMHit >= 19) {
                                let dmg = roll(3) + 2 - enemyDmgDebuff;
                                if (dmg < 1) dmg = 1;
                                if (finalMHit >= 19) {
                                    dmg *= 2;
                                    log("⚔️ 蛇魔連擊 (第 " + k + " 斬)：💥 暴擊！造成雙倍傷害 " + dmg + " 點物理傷害！", 'text-rose-500 font-bold animate-pulse');
                                } else {
                                    log("⚔️ 蛇魔連擊 (第 " + k + " 斬)：命中！造成 " + dmg + " 點物理傷害。", 'text-rose-400');
                                }
                                if (gameState.combatState.stoneskinTurns > 0) dmg = Math.max(1, Math.floor(dmg / 2));
                                gameState.player.hp -= dmg;
                           } else {
                                log("⚔️ 蛇魔連擊 (第 " + k + " 斬)：未命中。", 'text-gray-400');
                           }
                      }
                      updateStats();
                      if (gameState.player.hp <= 0) {
                          renderScene('gameOver');
                          return;
                      }
                 } else {
                     if (enemyHitTotal >= currentAC || finalEnemyRoll === 20) {
                         let enemyDmgBonus = (enemy.dmgBonus !== undefined) ? enemy.dmgBonus : 2;
                         let baseEnemyDmg = roll(enemy.dmg) + enemyDmgBonus;
                         
                         let isEnemyCrit = (finalEnemyRoll === 20);
                         
                         if (isEnemyCrit && enemy.isArmorMan) {
                              baseEnemyDmg *= 3; 
                              log("⚔️ 鎧甲男子雙眼猩紅大盛，使出不朽邪能【死亡死者衝鋒】！造成 3 倍爆發重擊！", 'text-fuchsia-500 font-extrabold animate-pulse');
                         } else if (isEnemyCrit) {
                              baseEnemyDmg *= 2;
                         }

                         let dmg = baseEnemyDmg - enemyDmgDebuff;
                         if (dmg < 1) dmg = 1;
                         
                         const isFireEnemy = enemy.fireImmune || enemy.name.includes('炎魔') || enemy.name.includes('雙頭犬') || enemy.name.includes('巨龍') || enemy.name.includes('紅龍');
                         if (gameState.combatState.barkskinTurns > 0 && isFireEnemy) {
                             dmg = Math.floor(dmg * 1.5);
                             log("⚠️ [警告] 因身上覆蓋著 [樹膚術]，極易燃的古樹之皮令你遭受來自 " + enemy.name + " 的火焰反擊傷害增至 1.5 倍！", 'text-orange-400 font-bold');
                         } else if (gameState.combatState.stoneskinTurns > 0) {
                             dmg = Math.max(1, Math.floor(dmg / 2));
                         }

                         gameState.player.hp -= dmg;
                         
                         if (enemy.isArmorMan) {
                              enemy.hp = Math.min(enemy.maxHp, enemy.hp + 2);
                              log("❤️ [邪神渴血] 鎧甲男子的符文大劍砍中你，貪婪地吸取血肉，恢復了 2 點生命值！", 'text-fuchsia-400 font-bold animate-pulse');
                         }

                         const statsPanel = document.getElementById('stats-panel');
                         statsPanel.classList.remove('shake');
                         void statsPanel.offsetWidth;
                         statsPanel.classList.add('shake');

                         playSynthSound('hit');
                         let dmgLogStr = "👹 敵人反擊！" + enemy.name + " 命中造成 " + dmg + " 點傷害。";
                         if (gameState.combatState.enemyIntimidatedTurns > 0) {
                             dmgLogStr += " (被驚嚇劣勢下依然命中！)";
                         }
                         if (enemyHitDebuff > 0) {
                             dmgLogStr += " (受減免減益影響)";
                         }
                         log(dmgLogStr, 'text-rose-500 font-bold');
                         
                         updateStats();
                         
                         if (gameState.player.hp <= 0) {
                             renderScene('gameOver');
                             return;
                         }
                     } else {
                         if(!shieldUsed) {
                             let missLogStr = "👹 敵人攻擊未命中。";
                             if (gameState.combatState.enemyIntimidatedTurns > 0) {
                                 missLogStr += " (威壓干擾生效)";
                             }
                             log(missLogStr, 'text-gray-400');
                         }
                     }
                 }
             }
             
             renderCombat(nextScene);
        }

        // ... [checkCombatEnd, window bindings] 已在此處保持完整 ...

        function checkCombatEnd(nextScene) {
             const enemy = gameState.currentEnemy;
             if (enemy.hp <= 0) {
                 enemy.hp = 0; 
                 
                 gameState.player.maxHp += 2;
                 gameState.player.hp += 2;
                 
                 updateStats(); 
                 
                 log("戰鬥勝利！" + enemy.name + " 被擊倒了。", 'text-emerald-400 font-bold text-lg');
                 log("✨ 吸收了敵人的殘留精華，最大生命值與當前生命值提升 2 點！", 'text-sky-300 font-bold');
                 
                 const actions = document.getElementById('action-panel');
                 actions.innerHTML = ''; 
                 
                 const btnProceed = document.createElement('button');
                 btnProceed.className = 'bg-emerald-700/80 hover:bg-emerald-600 p-4 rounded-xl font-bold text-white shadow-lg transition-all w-full sm:col-span-2 text-lg animate-fade-in';
                 btnProceed.textContent = '戰鬥結束，繼續前行';
                 
                 btnProceed.onclick = () => {
                      document.getElementById('enemy-stats-panel').classList.add('hidden');
                      renderScene(nextScene);
                 };
                 actions.appendChild(btnProceed);
                 return false; 
             }
             return true; 
        }

        window.log = log;
        window.roll = roll;
        window.updateStats = updateStats;
        window.renderScene = renderScene;
        window.startCombat = startCombat;
        window.renderCombat = renderCombat;
        window.playerTurn = playerTurn;
        window.enemyTurn = enemyTurn;
        window.usePotionOutsideCombat = usePotionOutsideCombat;
        window.usePotionInCombat = usePotionInCombat;
        window.playSynthSound = playSynthSound;

        // 綁定開局動作
        window.onload = () => {
            renderScene('selectClass');
        };
    </script>
</body>
</html>
